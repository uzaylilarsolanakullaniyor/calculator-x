<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Swap Cost Calculator</title>
<style>
  :root {
    --bg: #0b0e14;
    --card: #151a24;
    --card2: #1c2230;
    --accent: #22d3a6;
    --accent2: #3b82f6;
    --text: #e6ebf2;
    --muted: #8b95a7;
    --border: #232b3a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: radial-gradient(1200px 600px at 50% -10%, #1a2130 0%, var(--bg) 60%);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .app {
    width: 100%;
    max-width: 460px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.5);
  }
  .head { display: flex; align-items: center; gap: 12px; margin-bottom: 6px; }
  .logo {
    width: 42px; height: 42px; border-radius: 12px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
  }
  h1 { font-size: 19px; font-weight: 700; }
  .sub { color: var(--muted); font-size: 13px; margin-bottom: 22px; }

  .field { margin-bottom: 16px; }
  label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 7px; font-weight: 500; }
  .input-wrap { position: relative; }
  .input-wrap .pre, .input-wrap .suf {
    position: absolute; top: 50%; transform: translateY(-50%);
    color: var(--muted); font-size: 14px; pointer-events: none;
  }
  .pre { left: 14px; }
  .suf { right: 14px; }
  input {
    width: 100%;
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 13px 14px 13px 30px;
    color: var(--text);
    font-size: 16px;
    outline: none;
    transition: border-color .15s, box-shadow .15s;
  }
  input.no-pre { padding-left: 14px; }
  input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(34,211,166,.15); }

  .toggle { display: flex; gap: 8px; margin-bottom: 20px; }
  .toggle button {
    flex: 1; padding: 9px; font-size: 12.5px; cursor: pointer;
    background: var(--card2); color: var(--muted);
    border: 1px solid var(--border); border-radius: 10px;
    transition: all .15s; font-weight: 600;
  }
  .toggle button.on { background: rgba(34,211,166,.15); color: var(--accent); border-color: var(--accent); }

  .result {
    background: linear-gradient(135deg, rgba(34,211,166,.12), rgba(59,130,246,.10));
    border: 1px solid rgba(34,211,166,.3);
    border-radius: 16px;
    padding: 20px;
    margin-top: 8px;
  }
  .result .big { font-size: 34px; font-weight: 800; letter-spacing: -1px; }
  .result .big small { font-size: 15px; color: var(--muted); font-weight: 600; }
  .result .lbl { font-size: 12.5px; color: var(--muted); margin-bottom: 4px; }

  .rows { margin-top: 16px; display: grid; gap: 10px; }
  .row { display: flex; justify-content: space-between; font-size: 13.5px; }
  .row span:first-child { color: var(--muted); }
  .row span:last-child { font-weight: 600; }
  .divider { height: 1px; background: var(--border); margin: 4px 0; }
</style>
</head>
<body>
  <div class="app">
    <div class="head">
      <div class="logo">🔁</div>
      <h1>Swap Cost Calculator</h1>
    </div>
    <p class="sub">Calculate the total swap cost for your trading volume</p>

    <div class="field">
      <label>Cost per swap</label>
      <div class="input-wrap">
        <span class="pre">$</span>
        <input id="costPer" type="number" step="0.0001" value="0.001">
      </div>
    </div>

    <div class="field">
      <label>Amount per swap</label>
      <div class="input-wrap">
        <span class="pre">$</span>
        <input id="perSwap" type="number" step="1" value="150">
      </div>
    </div>

    <div class="field">
      <label>Total trading volume</label>
      <div class="input-wrap">
        <span class="pre">$</span>
        <input id="total" type="number" step="100" value="10000">
      </div>
    </div>

    <div class="result">
      <div class="lbl">Total cost</div>
      <div class="big" id="totalCost">$0.00</div>
      <div class="rows">
        <div class="row"><span>Number of swaps</span><span id="numSwaps">0</span></div>
        <div class="divider"></div>
        <div class="row"><span>Cost per swap</span><span id="perCostOut">$0</span></div>
        <div class="row"><span>Cost ratio</span><span id="ratio">0%</span></div>
      </div>
    </div>
  </div>

<script>
  const $ = id => document.getElementById(id);

  function fmt(n) {
    if (!isFinite(n)) return '$0.00';
    if (n !== 0 && Math.abs(n) < 0.01)
      return '$' + n.toFixed(6).replace(/0+$/,'').replace(/\.$/,'');
    return '$' + n.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
  }

  function calc() {
    const costPerSwap = parseFloat($('costPer').value) || 0;
    const perSwap = parseFloat($('perSwap').value) || 0;
    const total = parseFloat($('total').value) || 0;

    const numSwaps = perSwap > 0 ? total / perSwap : 0;
    const totalCost = numSwaps * costPerSwap;

    $('numSwaps').textContent = numSwaps.toLocaleString('en-US', {maximumFractionDigits: 2});
    $('totalCost').textContent = fmt(totalCost);
    $('perCostOut').textContent = fmt(costPerSwap);
    $('ratio').textContent = total > 0 ? (totalCost / total * 100).toFixed(4) + '%' : '0%';
  }

  ['costPer','perSwap','total'].forEach(id => $(id).addEventListener('input', calc));
  calc();
</script>
</body>
</html>

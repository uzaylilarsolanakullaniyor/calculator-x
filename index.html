<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Swap Cost Calculator</title>
<link rel="preload" as="image" href="t.png">
<style>
  :root {
    --bg: #0b0e14;
    --card: #151a24;
    --card2: #1c2230;
    --accent: #22d3a6;
    --accent2: #3b82f6;
    --text: #e6ebf2;
    --muted: #8b95a7;
    --border: #232b3a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html {
    background: var(--bg) url('t.png') no-repeat center center fixed;
    background-size: cover;
    overscroll-behavior: none;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg) url('t.png') no-repeat center center fixed;
    background-size: cover;
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    overscroll-behavior: none;
  }
  .app {
    width: 100%;
    max-width: 460px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.5);
  }
  .field { margin-bottom: 16px; }
  label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 7px; font-weight: 500; }
  .input-wrap { position: relative; }
  .input-wrap .pre, .input-wrap .suf {
    position: absolute; top: 50%; transform: translateY(-50%);
    color: var(--muted); font-size: 14px; pointer-events: none;
  }
  .pre { left: 14px; }
  .suf { right: 14px; }
  input {
    width: 100%;
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 13px 14px 13px 30px;
    color: var(--text);
    font-size: 16px;
    outline: none;
    transition: border-color .15s, box-shadow .15s;
  }
  input.no-pre { padding-left: 14px; }
  input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(34,211,166,.15); }

  .toggle { display: flex; gap: 8px; margin-bottom: 20px; }
  .toggle button {
    flex: 1; padding: 9px; font-size: 12.5px; cursor: pointer;
    background: var(--card2); color: var(--muted);
    border: 1px solid var(--border); border-radius: 10px;
    transition: all .15s; font-weight: 600;
  }
  .toggle button.on { background: rgba(34,211,166,.15); color: var(--accent); border-color: var(--accent); }

  .result {
    background: linear-gradient(135deg, rgba(34,211,166,.12), rgba(59,130,246,.10));
    border: 1px solid rgba(34,211,166,.3);
    border-radius: 16px;
    padding: 20px;
    margin-top: 8px;
  }
  .result .big { font-size: 34px; font-weight: 800; letter-spacing: -1px; }
  .result .big small { font-size: 15px; color: var(--muted); font-weight: 600; }
  .result .lbl { font-size: 12.5px; color: var(--muted); margin-bottom: 4px; }

  .rows { margin-top: 16px; display: grid; gap: 10px; }
  .row { display: flex; justify-content: space-between; font-size: 13.5px; }
  .row span:first-child { color: var(--muted); }
  .row span:last-child { font-weight: 600; }
  .divider { height: 1px; background: var(--border); margin: 4px 0; }
</style>
</head>
<body>
  <div class="app">
    <div class="field">
      <label>Cost per swap</label>
      <div class="toggle">
        <button id="modeFixed" class="on" data-mode="fixed">Fixed $</button>
        <button id="modePct" data-mode="pct">% of amount</button>
      </div>
      <div class="input-wrap">
        <span class="pre" id="costPre">$</span>
        <span class="suf" id="costSuf" style="display:none">%</span>
        <input id="costPer" type="number" step="0.0001" value="0.001">
      </div>
    </div>

    <div class="field">
      <label>Amount per swap</label>
      <div class="input-wrap">
        <span class="pre">$</span>
        <input id="perSwap" type="text" inputmode="decimal" value="150">
      </div>
    </div>

    <div class="field">
      <label>Total trading volume</label>
      <div class="input-wrap">
        <span class="pre">$</span>
        <input id="total" type="text" inputmode="decimal" value="10,000">
      </div>
    </div>

    <div class="result">
      <div class="lbl">Total cost</div>
      <div class="big" id="totalCost">$0.00</div>
      <div class="rows">
        <div class="row"><span>Number of swaps</span><span id="numSwaps">0</span></div>
        <div class="divider"></div>
        <div class="row"><span>Cost per swap</span><span id="perCostOut">$0</span></div>
        <div class="row"><span>Cost ratio</span><span id="ratio">0%</span></div>
      </div>
    </div>
  </div>

<script>
  const $ = id => document.getElementById(id);

  function fmt(n) {
    if (!isFinite(n)) return '$0.00';
    if (n !== 0 && Math.abs(n) < 0.01)
      return '$' + n.toFixed(6).replace(/0+$/,'').replace(/\.$/,'');
    return '$' + n.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
  }

  let mode = 'fixed'; // 'fixed' = $ per swap, 'pct' = % of amount per swap

  function setMode(m) {
    mode = m;
    $('modeFixed').classList.toggle('on', m === 'fixed');
    $('modePct').classList.toggle('on', m === 'pct');
    const isPct = m === 'pct';
    $('costPre').style.display = isPct ? 'none' : '';
    $('costSuf').style.display = isPct ? '' : 'none';
    $('costPer').classList.toggle('no-pre', isPct);
    $('costPer').value = isPct ? '0.3' : '0.001';
    calc();
  }

  const num = v => parseFloat(String(v).replace(/,/g, '')) || 0;

  function group(str) {
    str = str.replace(/[^0-9.]/g, '');
    const dot = str.indexOf('.');
    if (dot !== -1) str = str.slice(0, dot + 1) + str.slice(dot + 1).replace(/\./g, '');
    const parts = str.split('.');
    let intPart = parts[0].replace(/^0+(?=\d)/, '');
    intPart = intPart.replace(/\B(?=(\d{3})+(?!\d))/g, ',');
    return parts.length > 1 ? intPart + '.' + parts[1] : intPart;
  }

  function attachGrouping(el) {
    el.addEventListener('input', () => {
      const digitsBefore = el.value.slice(0, el.selectionStart).replace(/[^0-9.]/g, '').length;
      el.value = group(el.value);
      let count = 0, pos = 0;
      for (; pos < el.value.length && count < digitsBefore; pos++) {
        if (/[0-9.]/.test(el.value[pos])) count++;
      }
      el.setSelectionRange(pos, pos);
      calc();
    });
  }

  function calc() {
    const costInput = num($('costPer').value);
    const perSwap = num($('perSwap').value);
    const total = num($('total').value);

    // Cost of a single swap, in dollars
    const costPerSwap = mode === 'pct' ? perSwap * costInput / 100 : costInput;

    const numSwaps = perSwap > 0 ? total / perSwap : 0;
    const totalCost = numSwaps * costPerSwap;

    $('numSwaps').textContent = numSwaps.toLocaleString('en-US', {maximumFractionDigits: 2});
    $('totalCost').textContent = fmt(totalCost);
    $('perCostOut').textContent = fmt(costPerSwap);
    $('ratio').textContent = total > 0 ? (totalCost / total * 100).toFixed(4) + '%' : '0%';
  }

  $('modeFixed').addEventListener('click', () => setMode('fixed'));
  $('modePct').addEventListener('click', () => setMode('pct'));
  $('costPer').addEventListener('input', calc);
  ['perSwap','total'].forEach(id => attachGrouping($(id)));
  calc();
</script>
</body>
</html>
